name: ✨ Feature request
description: Suggest an idea or improvement for Pulse.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Pulse better! Please describe the problem you're
        trying to solve before the solution — it helps us find the best fit.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched [existing issues](https://github.com/pulse/pulse/issues) and discussions for this idea.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: "Is your request related to a frustration? e.g. \"I can't monitor a gRPC endpoint because…\""
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. A config snippet or mockup is welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're using today, or other approaches you weighed.

  - type: dropdown
    id: area
    attributes:
      label: Which part of Pulse would this touch?
      multiple: true
      options:
        - Monitoring engine (new check type / assertion)
        - Dashboard / status page UI
        - Notifications (new channel)
        - Access control / RBAC
        - Deployment / infrastructure
        - Docs / developer experience
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to help implement this.
