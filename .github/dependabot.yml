# Keep dependencies and GitHub Actions fresh.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ── npm (root + workspaces) ──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch routine patch/minor bumps into a single PR to cut review noise.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # ── GitHub Actions used in workflows ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
